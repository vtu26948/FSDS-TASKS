<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 20px;
    }

    h2 {
        text-align: center;
    }

    .controls {
        margin-bottom: 20px;
        text-align: center;
    }

    select, button {
        padding: 8px;
        margin: 5px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
    }

    th {
        background-color: #4CAF50;
        color: white;
    }

    .count-box {
        margin-top: 20px;
        padding: 10px;
        background: #fff;
        border: 1px solid #ccc;
    }
</style>
</head>
<body>

<h2>Student Records Dashboard</h2>

<div class="controls">
    <label>Filter by Department:</label>
    <select id="filterDept" onchange="filterDepartment()">
        <option value="All">All</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
    </select>

    <button onclick="sortByName()">Sort by Name</button>
    <button onclick="sortByDate()">Sort by DOB</button>
</div>

<table id="studentTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>DOB</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Arjun</td>
            <td>CSE</td>
            <td>2002-05-10</td>
        </tr>
        <tr>
            <td>Meena</td>
            <td>ECE</td>
            <td>2001-08-15</td>
        </tr>
        <tr>
            <td>Ravi</td>
            <td>CSE</td>
            <td>2003-01-20</td>
        </tr>
        <tr>
            <td>Sneha</td>
            <td>EEE</td>
            <td>2002-11-05</td>
        </tr>
    </tbody>
</table>

<div class="count-box">
    <strong>Student Count per Department:</strong>
    <p id="deptCount"></p>
</div>

<script>
function sortByName() {
    let table = document.getElementById("studentTable");
    let rows = Array.from(table.rows).slice(1);
    rows.sort((a, b) => a.cells[0].innerText.localeCompare(b.cells[0].innerText));
    rows.forEach(row => table.appendChild(row));
}

function sortByDate() {
    let table = document.getElementById("studentTable");
    let rows = Array.from(table.rows).slice(1);
    rows.sort((a, b) => new Date(a.cells[2].innerText) - new Date(b.cells[2].innerText));
    rows.forEach(row => table.appendChild(row));
}

function filterDepartment() {
    let filter = document.getElementById("filterDept").value;
    let rows = document.querySelectorAll("#studentTable tbody tr");

    rows.forEach(row => {
        let dept = row.cells[1].innerText;
        row.style.display = (filter === "All" || dept === filter) ? "" : "none";
    });

    countDepartments();
}

function countDepartments() {
    let rows = document.querySelectorAll("#studentTable tbody tr");
    let counts = {};

    rows.forEach(row => {
        if (row.style.display !== "none") {
            let dept = row.cells[1].innerText;
            counts[dept] = (counts[dept] || 0) + 1;
        }
    });

    let result = "";
    for (let dept in counts) {
        result += dept + ": " + counts[dept] + " | ";
    }

    document.getElementById("deptCount").innerText = result;
}

countDepartments();
</script>

</body>
</html>
